<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unmuted · Artist Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzdiNWVhNyIvPjxwYXRoIGQ9Ik0xNiA0djEwLjU1QTQgNCAwIDEgMCAxOCAxN1Y5aDRWNGgtNnoiIGZpbGw9IndoaXRlIi8+PC9zdmc+">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg></div>
      Unmuted <span class="logo-sub">Dashboard</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" id="view-page-btn" title="Open your Unmuted artist page" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View my page
      </button>
      <button class="btn btn-ghost" id="copy-link-btn" title="Copy your Unmuted share link" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy link
      </button>
      <button class="btn btn-primary" id="save-btn" disabled style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save changes
      </button>
    </div>
  </header>

  <!-- Setup screen -->
  <div id="setup-screen" class="setup-screen" style="display:none">
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px">
      <button id="lang-en" class="lang-btn active">English</button>
      <button id="lang-es" class="lang-btn">Español</button>
    </div>
    <div class="setup-card">
      <div class="setup-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      </div>
      <div class="setup-title" id="setup-title">Get started with Unmuted</div>
      <p class="setup-sub" id="setup-sub">Your music lives on your own free GitHub account. Just paste a token and we handle everything else.</p>
      <div id="setup-step-1"></div>
      <div id="setup-step-2" style="display:none"></div>
      <div id="setup-step-3" style="display:none"></div>
    </div>
  </div>

  <!-- Main layout -->
  <div class="layout" id="main-layout" style="display:none">
    <nav class="sidebar">
      <div class="nav-section">Profile</div>
      <button class="nav-item active" id="nav-profile" data-section="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </button>
      <button class="nav-item" id="nav-links" data-section="links">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Social links
      </button>
      <button class="nav-item" id="nav-recs" data-section="recs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Recommendations
      </button>
      <button class="nav-item" id="nav-settings" data-section="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Settings
      </button>
      <div class="nav-section">Releases</div>
      <div id="releases-nav"></div>
      <button class="nav-add" id="new-release-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New release
      </button>
    </nav>
    <main class="content" id="main-content"></main>
  </div>

  <!-- Modal for new release type -->
  <div class="modal-overlay" id="new-release-modal">
    <div class="modal">
      <div class="modal-title">What type of release?</div>
      <div class="type-option" data-type="album">
        <div class="type-option-icon" style="background:var(--blue-bg)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="12" r="4"/></svg></div>
        <div><div class="type-option-name">Album / EP</div><div class="type-option-desc">A full release with its own cover art</div></div>
      </div>
      <div class="type-option" data-type="playlist">
        <div class="type-option-icon" style="background:var(--pink-bg)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="1.8"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg></div>
        <div><div class="type-option-name">Playlist</div><div class="type-option-desc">Curate tracks from your existing releases</div></div>
      </div>
      <button class="btn btn-ghost" style="width:100%;justify-content:center" id="close-modal-btn">Cancel</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
